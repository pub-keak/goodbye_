<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A little something for you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#1b1814; --bg2:#272019;
    --paper:#FAF6EE; --paper2:#F3ECDD;
    --ink:#2A2620; --muted:#6E6353;
    --gold:#B0894F; --gold-soft:#C9AC78; --gold-line:#D8C39A;
    --shadow:rgba(0,0,0,.45);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;min-height:100%}
  body{
    font-family:'Jost',sans-serif;
    background:radial-gradient(130% 100% at 50% -5%, #2d251c 0%, var(--bg2) 45%, var(--bg1) 100%);
    background-attachment:fixed;color:var(--paper);
    min-height:100vh;min-height:100dvh;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;-webkit-tap-highlight-color:transparent;
  }
  .stage{position:relative;width:100%;max-width:470px;
    height:100vh;height:100dvh;min-height:580px;
    display:flex;align-items:center;justify-content:center;padding:24px}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:24px;text-align:center;
    opacity:0;pointer-events:none;transition:opacity .7s ease}
  .screen.active{opacity:1;pointer-events:auto}

  /* COUNTDOWN */
  #countdown .hint{font-family:'Fraunces',serif;font-style:italic;font-weight:400;
    font-size:25px;color:var(--gold-soft);margin-bottom:10px}
  #countdown .sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;
    color:var(--muted);margin-bottom:30px}
  .counter{font-family:'Fraunces',serif;font-weight:400;font-size:120px;line-height:1;
    color:var(--paper);text-shadow:0 6px 30px rgba(0,0,0,.5)}
  .counter.pop{animation:pop .9s cubic-bezier(.2,.9,.2,1)}
  @keyframes pop{0%{transform:scale(.5);opacity:0}35%{transform:scale(1.06);opacity:1}
    70%{transform:scale(.99)}100%{transform:scale(1);opacity:0}}

  /* ENVELOPE */
  .env-tap{font-size:11px;letter-spacing:4px;text-transform:uppercase;
    color:var(--gold-soft);margin-top:30px;animation:bob 2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
  .envelope{position:relative;width:276px;height:188px;cursor:pointer;
    filter:drop-shadow(0 22px 38px var(--shadow));transition:transform .4s ease}
  .envelope:active{transform:scale(.97)}
  .env-body{position:absolute;inset:0;border-radius:10px;
    background:linear-gradient(160deg,#FAF6EE,#EADFC9);overflow:hidden}
  .env-pocket{position:absolute;bottom:0;left:0;right:0;height:100%;
    background:linear-gradient(160deg,#F1E8D4,#E0D2B6);
    clip-path:polygon(0 32%,50% 100%,100% 32%,100% 100%,0 100%);z-index:3}
  .env-flap{position:absolute;top:0;left:0;right:0;height:62%;
    background:linear-gradient(160deg,#F7F0E1,#E6D8BD);
    clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top;
    transition:transform .8s cubic-bezier(.6,.05,.2,1);z-index:5;backface-visibility:hidden}
  .envelope.open .env-flap{transform:rotateX(180deg);z-index:1}
  .seal{position:absolute;top:46%;left:50%;width:50px;height:50px;
    transform:translate(-50%,-50%);border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--gold-soft),#8E6B36);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 12px rgba(0,0,0,.4),inset 0 1px 2px rgba(255,255,255,.3);
    z-index:6;font-family:'Fraunces',serif;font-style:italic;font-size:26px;
    color:#FBF6EC;transition:opacity .3s ease .1s}
  .envelope.open .seal{opacity:0}
  .env-letter{position:absolute;left:8%;right:8%;top:14%;height:64%;
    background:var(--paper);border-radius:4px;z-index:4;box-shadow:0 2px 8px rgba(0,0,0,.12);
    transform:translateY(0);transition:transform .8s ease .25s;
    display:flex;align-items:center;justify-content:center}
  .env-letter:after{content:"✦";color:var(--gold);font-size:18px;opacity:.5}
  .envelope.open .env-letter{transform:translateY(-58%)}

  /* CARD */
  #card{justify-content:flex-start;overflow-y:auto;padding:40px 22px 60px}
  .card-inner{width:100%;max-width:404px;background:var(--paper);border-radius:6px;
    padding:38px 30px 34px;color:var(--ink);position:relative;
    box-shadow:0 30px 70px var(--shadow);
    border:1px solid var(--gold-line);outline:1px solid rgba(176,137,79,.18);outline-offset:5px;
    transform:translateY(40px) scale(.97);opacity:0}
  #card.active .card-inner{animation:rise 1s cubic-bezier(.2,.85,.25,1) forwards}
  @keyframes rise{to{transform:translateY(0) scale(1);opacity:1}}

  .orn{text-align:center;color:var(--gold);font-size:16px;letter-spacing:6px;
    opacity:0}
  #card.active .orn{animation:fade .8s ease .35s forwards}
  @keyframes fade{to{opacity:1}}
  .eyebrow{text-align:center;font-size:10.5px;letter-spacing:4px;text-transform:uppercase;
    color:var(--gold);margin:12px 0 6px;font-weight:500}
  .title{font-family:'Fraunces',serif;font-weight:500;font-size:42px;line-height:1.05;
    text-align:center;color:var(--ink);letter-spacing:-.5px;margin-bottom:20px}
  .rule{width:46px;height:1px;background:var(--gold);margin:0 auto 20px;opacity:.6}
  .msg{font-family:'Fraunces',serif;font-weight:400;font-size:17px;line-height:1.65;
    color:#403930;text-align:center;letter-spacing:.1px}
  .label{text-align:center;font-size:10px;letter-spacing:3.5px;text-transform:uppercase;
    color:var(--gold);margin:26px 0 12px;font-weight:500}
  .gallery{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .ph{position:relative;overflow:hidden;border-radius:3px;background:#e8e0d2;
    border:1px solid #fff;box-shadow:0 5px 14px rgba(0,0,0,.16);
    opacity:0;transform:translateY(16px)}
  #card.active .ph{animation:phin .7s ease forwards}
  #card.active .ph:nth-child(1){animation-delay:.55s}
  #card.active .ph:nth-child(2){animation-delay:.68s}
  #card.active .ph:nth-child(3){animation-delay:.81s}
  #card.active .ph:nth-child(4){animation-delay:.94s}
  @keyframes phin{to{opacity:1;transform:translateY(0)}}
  .ph img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
  .ph:after{content:"";position:absolute;inset:0;
    box-shadow:inset 0 0 0 1px rgba(176,137,79,.28);border-radius:3px;pointer-events:none}

  .sign{font-family:'Fraunces',serif;font-style:italic;font-weight:400;font-size:20px;
    color:var(--muted);text-align:center;margin-top:24px}
  .footer-rule{display:flex;align-items:center;gap:12px;margin:24px 6px 0}
  .footer-rule:before,.footer-rule:after{content:"";flex:1;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold-line),transparent)}
  .footer-rule span{color:var(--gold);font-size:11px}
  .replay{display:block;margin:20px auto 0;background:none;border:none;font-family:'Jost';
    font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
    cursor:pointer;opacity:.7}
  .replay:hover{opacity:1;color:var(--gold)}

  .spark{position:absolute;color:var(--gold-soft);pointer-events:none;
    animation:floatup linear forwards;z-index:2;will-change:transform,opacity}
  @keyframes floatup{0%{transform:translateY(0) scale(.5);opacity:0}
    20%{opacity:.85}100%{transform:translateY(-112vh) scale(1) rotate(25deg);opacity:0}}
  .confetti{position:absolute;top:-12px;width:7px;height:11px;border-radius:1px;
    pointer-events:none;z-index:30;animation:fall ease-in forwards}
  @keyframes fall{0%{transform:translateY(0) rotate(0);opacity:1}
    100%{transform:translateY(112vh) rotate(680deg);opacity:.85}}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s!important;transition-duration:.2s!important}.spark{display:none}}
</style>
</head>
<body>

    <div class="hint">a little something for you</div>

    <div class="counter" id="num">5</div>

  <section class="screen" id="envScreen">

      <div class="env-letter"></div>
      <div class="env-pocket"></div>
      <div class="env-flap"></div>
      <div class="seal">P</div>

  <section class="screen" id="card">

      <div class="sign">with love, from all of us</div>

      <div class="footer-rule"><span>✦</span></div>
      <button class="replay" id="replay">Replay</button>
    </div>
  </section>

</div>

<script>
  const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const stage=document.getElementById('stage');
  const screens={countdown:document.getElementById('countdown'),
    env:document.getElementById('envScreen'),card:document.getElementById('card')};
  function show(n){Object.values(screens).forEach(s=>s.classList.remove('active'));screens[n].classList.add('active');}

  let sparkTimer=null;
  function spawnSpark(){
    const s=document.createElement('div');s.className='spark';
    s.textContent='✦';s.style.left=Math.random()*100+'%';s.style.bottom='-16px';
    s.style.fontSize=(8+Math.random()*12)+'px';s.style.opacity=.6;
    s.style.animationDuration=(7+Math.random()*5)+'s';
    stage.appendChild(s);setTimeout(()=>s.remove(),12000);
  }
  function startSparks(){if(reduce)return;sparkTimer=setInterval(spawnSpark,760);}

  function confetti(){
    if(reduce)return;
    const colors=['#B0894F','#C9AC78','#D8C39A','#EADFC9','#8E6B36'];
    for(let i=0;i<42;i++){
      const c=document.createElement('div');c.className='confetti';
      c.style.left=Math.random()*100+'%';c.style.background=colors[i%colors.length];
      c.style.animationDuration=(2.6+Math.random()*1.8)+'s';
      c.style.animationDelay=(Math.random()*.4)+'s';c.style.width=(5+Math.random()*5)+'px';
      stage.appendChild(c);setTimeout(()=>c.remove(),5200);
    }
  }

  const numEl=document.getElementById('num');
  function runCountdown(){
    show('countdown');let n=5;numEl.textContent=n;numEl.classList.add('pop');
    const tick=setInterval(()=>{
      n--;if(n<=0){clearInterval(tick);setTimeout(()=>show('env'),380);return;}
      numEl.textContent=n;numEl.classList.remove('pop');void numEl.offsetWidth;numEl.classList.add('pop');
    },1000);
  }

  const env=document.getElementById('envelope');
  function openCard(){
    if(env.classList.contains('open'))return;
    env.classList.add('open');confetti();
    setTimeout(()=>{show('card');startSparks();},880);
  }
  env.addEventListener('click',openCard);
  env.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openCard();}});

  document.getElementById('replay').addEventListener('click',()=>{
    clearInterval(sparkTimer);
    document.querySelectorAll('.spark,.confetti').forEach(n=>n.remove());
    env.classList.remove('open');runCountdown();
  });

  runCountdown();
</script>
